name: Auto Release Docker

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: adamilkom00/unpaksimonevv2_fe

    steps:
      # =========================
      # CHECKOUT
      # =========================
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =========================
      # GET TAG
      # =========================
      - name: Get latest tag
        id: tag
        run: |
          latest=$(git tag --sort=-v:refname | head -n 1)

          if [ -z "$latest" ]; then
            latest="v1.0.0"
          fi

          echo "LATEST=$latest" >> $GITHUB_OUTPUT

      # =========================
      # BUMP VERSION
      # =========================
      - name: Bump patch version
        id: version
        run: |
          tag=${{ steps.tag.outputs.LATEST }}
          version=${tag#v}

          IFS='.' read -r major minor patch <<< "$version"
          patch=$((patch + 1))

          new="v$major.$minor.$patch"

          echo "NEW_TAG=$new" >> $GITHUB_OUTPUT

      # =========================
      # CREATE TAG (SAFE)
      # =========================
      - name: Create Tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git tag ${{ steps.version.outputs.NEW_TAG }}
          git push origin ${{ steps.version.outputs.NEW_TAG }}

      # =========================
      # DOCKER LOGIN (SAFE)
      # =========================
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # =========================
      # SETUP BUILDX
      # =========================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # =========================
      # BUILD & PUSH (NO LEAK)
      # =========================
      - name: Build and Push Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          provenance: false   # 🔥 cegah metadata leak
          sbom: false         # 🔥 cegah info dependency leak
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.NEW_TAG }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max